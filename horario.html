<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Comic Sans MS', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom right, #ffe0e9, #ffccd5);
      color: #700028;
      padding: 6rem 1rem 2rem 1rem;
      overflow-x: hidden;
    }
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%;
      background-color: #ffb6c1;
      box-shadow: 0 4px 10px rgba(255, 100, 130, 0.3);
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; z-index: 1000;
      font-family: 'Comic Sans MS', sans-serif; box-sizing: border-box;
    }
    .navbar-logo { font-size: 1.3rem; font-weight: bold; color: #700028; }
    .navbar-links a { color: #700028; text-decoration: none; margin-left: 1.5rem; font-size: 1.1rem; transition: color 0.3s; }
    .navbar-links a:hover { color: #ff4d75; }
    h1 { font-size: 2rem; margin: 1.5rem 0; }
    p { font-size: 1.1rem; margin: 1rem 0; line-height: 1.6; }
    .fondo-corazones { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: -1; }
    .pochacco { position: absolute; top: -100px; animation: caer 10s linear forwards; opacity: 0.8; }
    @keyframes caer { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(100vh); opacity:0; } }
    .boton-final {
      margin-top: 1.5rem; background-color: #ff6f91; border: none;
      padding: 1rem 2rem; font-size: 1.1rem; color: white;
      border-radius: 1.5rem; box-shadow: 0 4px 10px rgba(255, 100, 130, 0.4);
      cursor: pointer; transition: transform 0.2s, background-color 0.3s;
    }
    .boton-final:hover { background-color: #ff4d75; transform: scale(1.05); }
    @media (max-width:480px) {
      body { padding: 6rem 1rem 2rem 1rem; }
      h1 { font-size: 1.6rem; }
      .navbar { flex-direction: column; align-items: flex-start; padding: 0.8rem 1rem; }
      .navbar-links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
      .navbar-links a { font-size: 0.95rem; margin-left: 0; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-logo">💌 Para Ti</div>
    <nav class="navbar-links">
      <a href="index.html">Inicio</a>
      <a href="index.html#collage">Collage</a>
      <a href="index.html#juego">Juego</a>
      <a href="cartas.html">Cartas</a>
      <a href="horario.html">Horario</a>
      <a href="galeria.html">Galería</a>
      <a href="sorpresa.html">Sorpresa</a>
    </nav>
  </header>

  <div class="fondo-corazones" id="fondoCorazones"></div>

  <main style="margin-top:120px;">
    <h1>Nuestro horario 💕</h1>
    <p>Aquí puedes ver nuestros momentos especiales y planes juntos ✨</p>
    <p>Pronto podrás agregar eventos y recordatorios aquí 📅</p>
    <button class="boton-final" onclick="window.location.href='index.html'">🏠 Volver al inicio</button>
  </main>

  <script>
    function crearPochacco() {
      const img = document.createElement('img');
      img.src = 'img/pochacco.webp';
      img.className = 'pochacco';
      img.style.left = Math.random() * 100 + 'vw';
      img.style.width = (Math.random() * 40 + 30) + 'px';
      img.style.animationDuration = (Math.random() * 5 + 5) + 's';
      document.getElementById('fondoCorazones').appendChild(img);
      setTimeout(() => img.remove(), 10000);
    }
    setInterval(crearPochacco, 1500);
  </script>
</body>
</html>
